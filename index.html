<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21:10 | Dedoum</title>
    <style>
        :root { --bg-color: #000000; --panel-bg: #111111; --border-color: #222222; --text-color: #ffffff; --yellow-led: #ffcc00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- ZONE CENTRALE --- */
        main { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
        .clock-zone { position: relative; flex: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 50px; border-right: 1px solid #222; }
        .date-display { font-size: 1.4rem; color: #888888; margin-bottom: 10px; }
        #clock { font-size: 8.5rem; font-weight: bold; color: var(--text-color); user-select: none; letter-spacing: -2px; }

        /* --- ÉLÉMENTS ANCRÉS DANS CLOCK-ZONE --- */
        .icon-btn { position: absolute; bottom: 25px; right: 25px; background: none; border: none; color: #ffffff; font-size: 1.6rem; cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
        .icon-btn.active { color: var(--yellow-led); opacity: 1; }
        
        .led-container { position: absolute; top: 20px; right: 25px; display: flex; flex-direction: row; align-items: center; gap: 12px; }
        .led-red, .led-jaune-mini { width: 20px; height: 20px; border-radius: 50%; opacity: 0; transition: opacity 0.3s ease; }
        
        /* Animation synchronisée */
        .led-red.blink, .led-jaune-mini.visible { opacity: 1; animation: blink-animation 0.9s infinite alternate; cursor: pointer; pointer-events: auto; }
        
        .led-red { background-color: #ff2222; box-shadow: 0 0 16px #ff2222; }
        .led-jaune-mini { background-color: var(--yellow-led); box-shadow: 0 0 16px var(--yellow-led); }

        @keyframes blink-animation { from { opacity: 0.4; } to { opacity: 1; } }

        /* --- TÂCHES --- */
        .tasks-zone { display: none; flex: 1; flex-direction: column; padding: 30px; overflow-y: auto; }
        .tasks-zone.has-tasks { display: flex; }
        .night-task-item { display: flex; align-items: center; gap: 12px; font-size: 1.1rem; background-color: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 16px; cursor: pointer; margin-bottom: 12px; }
        .task-led { width: 14px; height: 14px; border-radius: 50%; background-color: #ffcc00; animation: blink-animation 0.9s infinite alternate; }

        /* --- VOLET DROIT --- */
        .side-panel { position: fixed; top: 0; right: -450px; width: 100%; max-width: 420px; height: 100vh; background-color: var(--panel-bg); border-left: 1px solid var(--border-color); box-shadow: -10px 0 30px rgba(0,0,0,0.7); transition: right 0.4s cubic-bezier(0.05, 0.74, 0.2, 1); z-index: 15; }
        .side-panel.open { right: 0; }
        .panel-content { padding: 25px; }
        .hidden { display: none !important; }
        .btn-submit { background-color: #ffffff; color: #000000; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<main>
    <div class="clock-zone">
        <button class="icon-btn" id="togglePanelBtn" title="Renseigner les rapports">📝</button>
        <div class="led-container">
            <div id="led-rouge" class="led-red" title="Alerte de minuit"></div>
            <div id="led-jaune-mini" class="led-jaune-mini" title="Tâches en attente" onclick="deployerTaches()"></div>
        </div>
        <div class="date-display" id="date-label"></div>
        <div id="clock">00:00</div>
    </div>

    <div class="tasks-zone" id="tasks-zone">
        <button class="tasks-collapse-btn" onclick="retracterTaches()" style="align-self: flex-end; background:none; border:none; color:#888; cursor:pointer;">Réduire ▸</button>
        <div class="night-tasks" id="night-tasks"></div>
    </div>
</main>

</html>
