<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dedoum | Console</title>
    <style>
        :root { --bg-color: #000; --panel-bg: #111; --text-color: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #clock { font-size: 8rem; font-weight: bold; }
        #weather-display { font-size: 1.5rem; color: #aaa; margin-top: 10px; }
        .controls { position: absolute; bottom: 30px; right: 30px; }
        .icon-btn { background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; opacity: 0.5; }
        .side-panel { position: fixed; top: 0; right: -450px; width: 420px; height: 100vh; background: #111; border-left: 1px solid #333; transition: 0.4s; padding: 25px; }
        .side-panel.open { right: 0; }
        input, select, textarea { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 8px; margin-top: 5px; box-sizing: border-box;}
        .btn-submit { background: #fff; color: #000; width: 100%; padding: 10px; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <main style="text-align:center;">
        <div id="clock">00:00</div>
        <!-- Ici s'affichera la météo -->
        <div id="weather-display">Chargement météo...</div>
    </main>

    <div class="controls">
        <button class="icon-btn" id="togglePanelBtn">📝</button>
    </div>

    <div class="side-panel" id="questionnairePanel">
        <h2>Prise de service</h2>
        <input type="number" id="effectif" placeholder="Effectif présent">
        <select id="ssi"><option>SSI : RAS</option><option>SSI : Défaut(s)</option></select>
        <textarea id="commentaires" placeholder="Commentaires..."></textarea>
        <button class="btn-submit" onclick="genererRapport()">Générer le rapport</button>
        <div id="output" style="margin-top:20px; font-size:0.9rem;"></div>
    </div>

    <script>
        // 1. HORLOGE
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // 2. MÉTÉO (Automatique sans ouvrir de page)
        async function fetchWeather() {
            try {
                // Coordonnées Amiens
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=49.89&longitude=2.30&current=temperature_2m,weather_code');
                const data = await res.json();
                const temp = data.current.temperature_2m;
                document.getElementById('weather-display').innerText = `Amiens : ${temp}°C`;
            } catch (e) {
                document.getElementById('weather-display').innerText = "Météo indisponible";
            }
        }
        fetchWeather();

        // 3. PANNEAU
        document.getElementById('togglePanelBtn').onclick = () => document.getElementById('questionnairePanel').classList.toggle('open');

        function genererRapport() {
            const e = document.getElementById('effectif').value;
            const s = document.getElementById('ssi').value;
            const c = document.getElementById('commentaires').value;
            document.getElementById('output').innerText = `Rapport : ${e} agents | ${s} | ${c}`;
        }
    </script>
</body>
</html>
