<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST LIVE LED - Horloge & Liste</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background-color: black;
            color: white;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Conteneur principal */
        #main-container {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
        }

        /* Partie Horloge : 100% par défaut, 66% si la liste est active */
        #clock-zone {
            flex: 0 0 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: flex 0.4s ease;
        }

        /* Partie Liste (1/3) */
        #todo-list {
            flex: 0 0 33.33%;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        #date { font-size: 2.5vw; opacity: 0.6; margin-bottom: 1vh; text-transform: capitalize; }
        #clock { font-size: 13vw; font-weight: 700; }

        .todo-item {
            font-size: 1.5vw;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s ease;
        }
        .todo-item.fade-out { opacity: 0; transform: translateX(30px); height: 0; margin: 0; overflow: hidden; }
        .todo-checkbox { width: 1.6vw; height: 1.6vw; cursor: pointer; }

        /* Style de la LED de notification */
        #notification-led {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: transparent;
            box-shadow: none;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            z-index: 20;
        }
        #notification-led.active {
            background-color: #ff3b30;
            box-shadow: 0 0 10px #ff3b30, 0 0 20px #ff3b30;
        }

        /* Contrôles en bas à droite */
        #controls-container { 
            position: absolute; 
            bottom: 25px; 
            right: 25px; 
            z-index: 10; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            opacity: 0.5; 
            transition: opacity 0.2s;
        }
        #controls-container:hover { opacity: 0.9; }

        #weather {
            display: none;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .weather-column { display: flex; flex-direction: column; align-items: center; font-size: 14px; }
        .weather-hour { font-weight: bold; opacity: 0.5; margin-bottom: 2px; }
        .weather-proba { opacity: 0.9; }

        .control-btn { font-size: 24px; cursor: pointer; width: 35px; height: 35px; text-align: center; line-height: 35px; color: inherit; position: relative; display: inline-block; }
        #color-picker { opacity: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }
        :fullscreen #controls-container { display: none; }
    </style>
</head>
<body>

    <div id="notification-led"></div>

    <div id="main-container">
        <div id="clock-zone" onclick="toggleFullscreen()">
            <div id="date">Chargement...</div>
            <div id="clock">00:00</div>
        </div>

        <div id="todo-list">
            <div id="todo-items-container"></div>
        </div>
    </div>

    <div id="controls-container">
        <div id="weather"></div>
        <span id="umbrella-btn" class="control-btn" title="Afficher la météo">&#9730;</span>
        <span id="gear-btn" class="control-btn" title="Changer la couleur">
            &#9881;
            <input type="color" id="color-picker" value="#000000">
        </span>
    </div>

    <script>
        let lastCheckedDayStr = "";
        let hiddenTasks = new Set();
        const weatherDiv = document.getElementById('weather');
        
        let ledDismissed = false;

        function updateClockAndTasks() {
            const now = new Date();
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            const hours = now.getHours();
            const minutes = now.getMinutes();
            document.getElementById('clock').innerHTML = String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');

            const totalMinutes = hours * 60 + minutes;
            
            // --- GESTION DE LA LED DE TEST ---
            const led = document.getElementById('notification-led');
            
            // La LED est active uniquement entre 23h30 et 06h30
            const isTestRange = (totalMinutes >= (23 * 60 + 30) || totalMinutes < 6 * 60 + 30);

            if (isTestRange) {
                // Réinitialisation de la LED à 23h30 pile
                if (hours === 23 && minutes === 30 && ledDismissed) {
                    ledDismissed = false;
                }

                // Si pas encore éteinte manuellement, elle s'allume
                if (!ledDismissed) {
                    led.classList.add('active');
                } else {
                    led.classList.remove('active');
                }
            } else {
                // S'éteint automatiquement à 06h30 (ou reste éteinte en dehors de la plage)
                led.classList.remove('active');
                ledDismissed = false; 
            }
