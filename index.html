<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: black;
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        #click-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1;
        }

        #date {
            font-size: 3.5vw;
            opacity: 0.6;
            margin-bottom: 1vh;
            text-transform: capitalize;
            letter-spacing: 1px;
        }
        #clock {
            font-size: 16vw;
            font-weight: 700;
            letter-spacing: -2px;
        }
        .seconds {
            font-size: 8vw;
            opacity: 0.3;
            margin-left: 15px;
            font-weight: 400;
        }

        #color-picker-container {
            position: absolute;
            bottom: 25px;
            right: 25px;
            z-index: 10;
            opacity: 0.3;
            transition: opacity 0.2s, transform 0.3s ease;
        }
        #color-picker-container:hover {
            opacity: 0.8;
            transform: rotate(45deg);
        }
        #color-label {
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }
        #color-picker {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        :fullscreen #color-picker-container {
            display: none;
        }
    </style>
</head>
<body>

    <div id="click-zone">
        <div id="date"></div>
        <div id="clock">00:00<span class="seconds">:00</span></div>
    </div>

    <div id="color-picker-container">
        <span id="color-label">⚙️</span>
        <input type="color" id="color-picker" value="#000000">
    </div>

    <script>
        const body = document.body;
        const colorPicker = document.getElementById('color-picker');

        // Fonction pour empêcher la mise en veille de l'écran
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.log("Wake Lock non supporté ou refusé : " + err.message);
            }
        }

        // Initialisation
        requestWakeLock();
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', options);

            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerHTML = h + ':' + m + '<span class="seconds">:' + s + '</span>';
        }
        
        document.getElementById('click-zone').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                document.exitFullscreen();
            }
        });

        colorPicker.addEventListener('input', (e) => {
            const bgColor = e.target.value;
            body.style.backgroundColor = bgColor;
            const r = parseInt(bgColor.substr(1,2), 16);
            const g = parseInt(bgColor.substr(3,2), 16);
            const b = parseInt(bgColor.substr(5,2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            body.style.color = brightness > 128 ? '#000000' : '#ffffff';
        });

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
