<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background-color: black;
            color: white;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Conteneur principal */
        #main-container {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
        }

        /* Partie Horloge : 100% par défaut, 66% si la liste est active */
        #clock-zone {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: flex 0.4s ease;
            position: relative;
        }

        /* Partie Liste (1/3) */
        #todo-list {
            flex: 0 0 33.33%;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            transition: all 0.4s ease;
        }

        #date { font-size: 2.5vw; opacity: 0.6; margin-bottom: 1vh; text-transform: capitalize; }
        #clock { font-size: 13vw; font-weight: 700; }

        .todo-item {
            font-size: 1.5vw;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s ease;
        }
        .todo-item.fade-out { opacity: 0; transform: translateX(30px); height: 0; margin: 0; overflow: hidden; }
        .todo-checkbox { width: 1.6vw; height: 1.6vw; cursor: pointer; }

        /* Onglet latéral style Samsung */
        #side-handle {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 90px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px 0 0 8px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            transition: background 0.2s, right 0.4s ease;
        }
        #side-handle:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        #side-handle::after {
            content: "‹";
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
        }
        #side-handle.open::after {
            content: "›";
        }

        /* Conteneur des LEDs en haut à droite */
        #led-container {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }

        /* Style des LEDs (30px x 30px) */
        .led {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: transparent;
            box-shadow: none;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* LED Rouge Active */
        #notification-led.active {
            background-color: #ff3b30;
            box-shadow: 0 0 15px #ff3b30, 0 0 25px #ff3b30;
        }

        /* LED Jaune Active */
        #task-led.active {
            background-color: #ffcc00;
            box-shadow: 0 0 15px #ffcc00, 0 0 25px #ffcc00;
        }

        /* Contrôles bas droite */
        #controls-container { 
            position: absolute; 
            bottom: 25px; 
            right: 25px; 
            z-index: 10; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            opacity: 0.5; 
            transition: opacity 0.2s;
        }
        #controls-container:hover { opacity: 0.9; }

        #weather {
            display: none;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .weather-column { display: flex; flex-direction: column; align-items: center; font-size: 14px; }
        .weather-hour { font-weight: bold; opacity: 0.5; margin-bottom: 2px; }
        .weather-proba { opacity: 0.9; }

        .control-btn { font-size: 24px; cursor: pointer; width: 35px; height: 35px; text-align: center; line-height: 35px; color: inherit; position: relative; display: inline-block; }
        #color-picker { opacity: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }
        
        :fullscreen #controls-container { display: none; }

        /* Ajustement spécial pour mobiles (évite le masquage par la barre de navigation Chrome/Samsung) */
        @media (max-width: 1024px) {
            #controls-container {
                bottom: 60px; /* Remonte le bloc pour esquiver la barre du navigateur */
                right: 20px;
                opacity: 0.8; /* Légèrement plus visible sur mobile car pas de survol de souris possible */
            }
            #weather {
                max-width: 70vw;
                overflow-x: auto; /* Permet de faire défiler la météo si l'écran est trop étroit */
            }
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="clock-zone" onclick="toggleFullscreen()">
            
            <div id="side-handle" onclick="toggleTodoListPanel(event)"></div>

            <div id="led-container" onclick="event.stopPropagation()">
                <div id="task-led" class="led" title="Tâches en attente"></div>
                <div id="notification-led" class="led" title="Alerte Minuit"></div>
            </div>
            
            <div id="date">Chargement...</div>
            <div id="clock">00:00</div>
            
            <div id="controls-container" onclick="event.stopPropagation()">
                <div id="weather"></div>
                <span id="umbrella-btn" class="control-btn" title="Afficher la météo">&#9730;</span>
                <span id="gear-btn" class="control-btn" title="Changer la couleur">
                    &#9881;
                    <input type="color" id="color-picker" value="#000000">
                </span>
            </div>
        </div>

        <div id="todo-list">
            <div id="todo-items-container"></div>
        </div>
    </div>

    <script>
        let lastCheckedDayStr = "";
        
        let hiddenTasks = new Set(JSON.parse(localStorage.getItem('hiddenTasks')) || []);
        
        const weatherDiv = document.getElementById('weather');
        const controlsContainer = document.getElementById('controls-container');
        
        let ledDismissed = false;
        let pageLaunched = false; 
        let midnightCrossed = false;
        let panelManuallyClosed = false;

        function saveHiddenTasks() {
            localStorage.setItem('hiddenTasks', JSON.stringify(Array.from(hiddenTasks)));
        }

        function clearHiddenTasks() {
            hiddenTasks.clear();
            localStorage.removeItem('hiddenTasks');
        }

        function getFirstMondayDate(year, month) {
            let d = new Date(year, month, 1);
            while (d.getDay() !== 1) {
                d.setDate(d.getDate() + 1);
            }
            return d.getDate();
        }

        function updateClockAndTasks() {
            const now = new Date();
            
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            const hours = now.getHours();
            const minutes = now.getMinutes();
            document.getElementById('clock').innerHTML = String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');

            const totalMinutes = hours * 60 + minutes;
            
            // --- GESTION DE LA LED ROUGE (FRANCHISSEMENT DE MINUIT) ---
            const redLed = document.getElementById('notification-led');
            
            if (!pageLaunched) {
                pageLaunched = true;
                midnightCrossed = false;
            }

            if (hours === 0 && minutes === 0) {
                if (!midnightCrossed) {
                    midnightCrossed = true;
                    ledDismissed = false;
                }
            }

            if (totalMinutes >= 6 * 60 + 30 && totalMinutes < 19 * 60) {
                midnightCrossed = false;
                ledDismissed = false;
            }

            if (midnightCrossed && !ledDismissed && totalMinutes < 6 * 60 + 30) {
                redLed.classList.add('active');
            } else {
                redLed.classList.remove('active');
            }

            // --- VÉRIFICATION DU SHIFT POUR LES TÂCHES ---
            const isShiftActive = (totalMinutes >= 19 * 60) || (totalMinutes < 6 * 60 + 30);
            
            const todoListDiv = document.getElementById('todo-list');
            const clockZone = document.getElementById('clock-zone');
            const sideHandle = document.getElementById('side-handle');
            const taskLed = document.getElementById('task-led');

            if (!isShiftActive) {
                todoListDiv.style.display = 'none';
                clockZone.style.flex = "0 0 100%";
                sideHandle.style.display = 'none';
                clearHiddenTasks(); 
                taskLed.classList.remove('active');
                return; 
            }

            let referenceDate = new Date(now);
            if (hours < 12) referenceDate.setDate(referenceDate.getDate() - 1);
            
            const currentDayStr = referenceDate.toDateString();
            if (currentDayStr !== lastCheckedDayStr) {
                clearHiddenTasks(); 
                lastCheckedDayStr = currentDayStr;
                panelManuallyClosed = false; 
            }

            const dayOfWeek = referenceDate.getDay();
            const dateNum = referenceDate.getDate();

            const firstMondayDate = getFirstMondayDate(referenceDate.getFullYear(), referenceDate.getMonth());
            
            const isFirstMonday = (dayOfWeek === 1 && dateNum === firstMondayDate);
            const isFirstTuesday = (dayOfWeek === 2 && dateNum === (firstMondayDate + 1));
            const isFirstWednesday = (dayOfWeek === 3 && dateNum === (firstMondayDate + 2));
            const isFirstThursday = (dayOfWeek === 4 && dateNum === (firstMondayDate + 3));
            const isFirstFriday = (dayOfWeek === 5 && dateNum === (firstMondayDate + 4));

            let tasks = [];
            
            if (dayOfWeek === 2) tasks.push("B1 : Contrôle des vannes de postes");
            
            if (isFirstMonday) { tasks.push("B1 : Contrôle des IS"); tasks.push("B1 : Contrôle des DM"); }
            if (isFirstTuesday) { tasks.push("B1 : Contrôle des compteurs paratonnerre"); tasks.push("B1 : Contrôle des douches et rince-œil"); tasks.push("B2 : Contrôle des compteurs paratonnerre"); }
            if (isFirstWednesday) tasks.push("B1 : Contrôle des cales et chandelles");
            if (isFirstThursday) tasks.push("B1 : Contrôle des éclairages entrepôt");
            if (isFirstFriday) tasks.push("B1 : Contrôle des BAES");

            const visibleTasks = tasks.filter(task => !hiddenTasks.has(task));

            // --- GESTION DE LA LED JAUNE ET DU PANNEAU LATÉRAL ---
            if (visibleTasks.length > 0) {
                taskLed.classList.add('active');
                sideHandle.style.display = 'flex';

                if (!panelManuallyClosed) {
                    todoListDiv.style.display = 'block';
                    clockZone.style.flex = "0 0 66.66%";
                    sideHandle.classList.add('open');
                } else {
                    todoListDiv.style.display = 'none';
                    clockZone.style.flex = "0 0 100%";
                    sideHandle.classList.remove('open');
                }

                const container = document.getElementById('todo-items-container');
                const activeItems = container.querySelectorAll('.todo-item:not(.fade-out)');
                if (activeItems.length !== visibleTasks.length) {
                    container.innerHTML = visibleTasks.map(task => `
                        <div class="todo-item" data-task="${task}">
                            <input type="checkbox" class="todo-checkbox" onchange="checkTask(this)">
                            <span>${task}</span>
                        </div>
                    `).join('');
                }
            } else {
                taskLed.classList.remove('active');
                sideHandle.style.display = 'none';
                todoListDiv.style.display = 'none';
                clockZone.style.flex = "0 0 100%";
            }
        }

        function toggleTodoListPanel(e) {
            if (e) e.stopPropagation();
            const todoListDiv = document.getElementById('todo-list');
            if (todoListDiv.style.display === 'block') {
                panelManuallyClosed = true;
            } else {
                panelManuallyClosed = false;
            }
            updateClockAndTasks();
        }

        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.key === ' ') {
                const led = document.getElementById('notification-led');
                if (led.classList.contains('active')) {
                    e.preventDefault();
                    ledDismissed = true;
                    led.classList.remove('active');
                }
            }
            if (e.code === 'Enter' || e.key === 'Enter') {
                e.preventDefault();
                toggleTodoListPanel();
            }
        });

        function checkTask(checkbox) {
            const item = checkbox.closest('.todo-item');
            hiddenTasks.add(item.getAttribute('data-task'));
            saveHiddenTasks(); 
            item.classList.add('fade-out');
            setTimeout(updateClockAndTasks, 400);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
            else document.exitFullscreen();
        }

        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=49.8942&longitude=2.2957&hourly=precipitation_probability&forecast_days=2');
                const data = await res.json();
                const currentHour = new Date().getHours();
                let htmlContent = '';
                for (let i = 0; i <= 12; i++) {
                    const targetHour = (currentHour + i) % 24;
                    const proba = data.hourly.precipitation_probability[currentHour + i];
                    htmlContent += `<div class="weather-column"><span class="weather-hour">${targetHour}h</span><span class="weather-proba">${proba}%</span></div>`;
                }
                weatherDiv.innerHTML = htmlContent;
            } catch (err) {
                weatherDiv.textContent = 'Météo indisponible';
            }
        }

        document.getElementById('umbrella-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            if (weatherDiv.style.display === 'flex') {
                weatherDiv.style.display = 'none';
            } else {
                weatherDiv.style.display = 'flex';
                updateWeather();
            }
        });

        document.getElementById('color-picker').addEventListener('input', (e) => {
            const col = e.target.value;
            document.body.style.backgroundColor = col;
            const brightness = (parseInt(col.substr(1,2),16)*299 + parseInt(col.substr(3,2),16)*587 + parseInt(col.substr(5,2),16)*114)/1000;
            const finalColor = brightness > 128 ? '#000000' : '#ffffff';
            document.body.style.color = finalColor;
            document.getElementById('umbrella-btn').style.color = finalColor;
            document.getElementById('gear-btn').style.color = finalColor;
        });

        let wakeLock = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }
        requestWakeLock();
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });

        setInterval(updateClockAndTasks, 1000);
        updateClockAndTasks();
    </script>
</body>
</html>
