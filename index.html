<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: black;
            color: white;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        #click-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1;
        }
        #date {
            font-size: 3.5vw;
            opacity: 0.6;
            margin-bottom: 1vh;
            text-transform: capitalize;
        }
        #clock {
            font-size: 16vw;
            font-weight: 700;
        }
        .seconds {
            font-size: 8vw;
            opacity: 0.3;
            margin-left: 15px;
        }
        #controls-container {
            position: absolute;
            bottom: 25px;
            right: 25px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        #controls-container:hover {
            opacity: 0.9;
        }
        #weather {
            font-size: 18px;
            opacity: 0.7;
            display: none;
            white-space: nowrap;
        }
        .control-btn {
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            position: relative; /* Indispensable pour bloquer le sélecteur dedans */
            display: inline-block;
            width: 35px;
            height: 35px;
            text-align: center;
            line-height: 35px;
        }
        #color-picker {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        :fullscreen #controls-container {
            display: none;
        }
    </style>
</head>
<body>

    <div id="click-zone">
        <div id="date">Chargement date...</div>
        <div id="clock">00:00<span class="seconds">:00</span></div>
    </div>

    <div id="controls-container">
        <div id="weather">Pluie: --%</div>
        <span id="umbrella-btn" class="control-btn" title="Afficher la météo">☂️</span>
        <span id="gear-btn" class="control-btn">
            ⚙️
            <input type="color" id="color-picker" value="#000000">
        </span>
    </div>

    <script>
        // 1. Horloge
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', options);

            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerHTML = h + ':' + m + '<span class="seconds">:' + s + '</span>';
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Couleur de fond
        const picker = document.getElementById('color-picker');
        picker.addEventListener('input', function(e) {
            const col = e.target.value;
            document.body.style.backgroundColor = col;
            
            const r = parseInt(col.substr(1,2), 16);
            const g = parseInt(col.substr(3,2), 16);
            const b = parseInt(col.substr(5,2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            document.body.style.color = brightness > 128 ? '#000000' : '#ffffff';
        });

        // 3. Météo
        const weatherDiv = document.getElementById('weather');
        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=49.8942&longitude=2.2957&hourly=precipitation_probability&forecast_days=1');
                const data = await res.json();
                const hour = new Date().getHours();
                const proba = data.hourly.precipitation_probability[hour];
                weatherDiv.textContent = 'Pluie : ' + proba + '%';
            } catch (err) {
                weatherDiv.textContent = 'Météo indisponible';
            }
        }

        // Clic sur le bouton parapluie
        document.getElementById('umbrella-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            if (weatherDiv.style.display === 'block') {
                weatherDiv.style.display = 'none';
            } else {
                weatherDiv.style.display = 'block';
                updateWeather();
            }
        });

        // 4. Plein écran et Anti-veille
        document.getElementById('click-zone').addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function() {});
            } else {
                document.exitFullscreen();
            }
        });

        let wakeLock = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }
        requestWakeLock();
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });
    </script>
</body>
</html>
