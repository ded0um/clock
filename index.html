<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00:00 | Dedoum</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #clock {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00ffcc;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .section {
            background-color: #1e1e1e;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .section-header {
            background-color: #2a2a2a;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .section-header:hover {
            background-color: #333;
        }
        .section-content {
            padding: 15px;
            display: none;
        }
        .section-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .grid-checkbox {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 5px;
        }
        .grid-checkbox label {
            background-color: #252525;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #3a3a3a;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .grid-checkbox label:hover {
            background-color: #333;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #2b2b2b;
            color: #fff;
            box-sizing: border-box;
        }
        .hidden {
            display: none;
        }
        .btn-submit {
            background-color: #00ffcc;
            color: #121212;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-submit:hover {
            background-color: #00ccaa;
        }
        h3 {
            margin-top: 0;
            color: #00ffcc;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <!-- Horloge sans les secondes -->
    <div id="clock">00:00</div>

    <div class="container">
        
        <!-- SECTION 1 : SSI -->
        <div class="section">
            <div class="section-header" onclick="toggleSection(this)">
                <span>REPORT SSI (B1 & B2)</span>
                <span>▼</span>
            </div>
            <div class="section-content">
                <!-- SSI B1 -->
                <h3>SSI B1</h3>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="ssi_b1" value="RAS" checked onchange="toggleDetails('ssi_b1_details', this.value)"> RAS</label>
                        <label><input type="radio" name="ssi_b1" value="NON RAS" onchange="toggleDetails('ssi_b1_details', this.value)"> NON RAS (Dérangement / Anomalie)</label>
                    </div>
                </div>
                <div id="ssi_b1_details" class="hidden">
                    <div class="form-group">
                        <label>Voyants allumés :</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" value="Dérangement"> Dérangement</label>
                            <label><input type="checkbox" value="Veille restreinte"> Veille restreinte</label>
                            <label><input type="checkbox" value="Alarme feu"> Alarme feu</label>
                            <label><input type="checkbox" value="Évacuation générale"> Évacuation générale</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Zones en alarme (B1) :</label>
                        <div class="grid-checkbox">
                            <label><input type="checkbox" value="Z1"> Z1</label>
                            <label><input type="checkbox" value="Z2"> Z2</label>
                            <label><input type="checkbox" value="Z3"> Z3</label>
                            <label><input type="checkbox" value="Z4"> Z4</label>
                            <label><input type="checkbox" value="Z5"> Z5</label>
                            <label><input type="checkbox" value="Z6"> Z6</label>
                            <label><input type="checkbox" value="Z7"> Z7</label>
                            <label><input type="checkbox" value="Z8"> Z8</label>
                        </div>
                    </div>
                </div>

                <hr style="border-color: #333; margin: 20px 0;">

                <!-- SSI B2 -->
                <h3>SSI B2</h3>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="ssi_b2" value="RAS" checked onchange="toggleDetails('ssi_b2_details', this.value)"> RAS</label>
                        <label><input type="radio" name="ssi_b2" value="NON RAS" onchange="toggleDetails('ssi_b2_details', this.value)"> NON RAS</label>
                    </div>
                </div>
                <div id="ssi_b2_details" class="hidden">
                    <div class="form-group">
                        <label>Voyants allumés :</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" value="Dérangement"> Dérangement</label>
                            <label><input type="checkbox" value="Veille restreinte"> Veille restreinte</label>
                            <label><input type="checkbox" value="Alarme feu"> Alarme feu</label>
                            <label><input type="checkbox" value="Évacuation générale"> Évacuation générale</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Zones en alarme (B2) :</label>
                        <div class="grid-checkbox">
                            <label><input type="checkbox" value="Z1"> Z1</label>
                            <label><input type="checkbox" value="Z2"> Z2</label>
                            <label><input type="checkbox" value="Z3"> Z3</label>
                            <label><input type="checkbox" value="Z4"> Z4</label>
                            <label><input type="checkbox" value="Z5"> Z5</label>
                            <label><input type="checkbox" value="Z6"> Z6</label>
                            <label><input type="checkbox" value="Z7"> Z7</label>
                            <label><input type="checkbox" value="Z8"> Z8</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION 2 : SPRINKLER & ALARMES TECHNIQUES -->
        <div class="section">
            <div class="section-header" onclick="toggleSection(this)">
                <span>REPORT SPRINKLER & ALARMES</span>
                <span>▼</span>
            </div>
            <div class="section-content">
                <h3>Sprinkler</h3>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="sprinkler" value="RAS" checked onchange="toggleDetails('sprinkler_details', this.value)"> RAS Sprinkler</label>
                        <label><input type="radio" name="sprinkler" value="NON RAS" onchange="toggleDetails('sprinkler_details', this.value)"> NON RAS Sprinkler</label>
                    </div>
                </div>
                <div id="sprinkler_details" class="hidden">
                    <div class="form-group">
                        <label>Voyants Sprinkler :</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" value="Feu"> Feu</label>
                            <label><input type="checkbox" value="Zone locale"> Zone locale</label>
                            <label><input type="checkbox" value="Zone voisine"> Zone voisine</label>
                            <label><input type="checkbox" value="Défaut général"> Défaut général</label>
                            <label><input type="checkbox" value="Hors service"> Hors service</label>
                            <label><input type="checkbox" value="Défaut T.R.E."> Défaut T.R.E.</label>
                            <label><input type="checkbox" value="Défaut alimentation"> Défaut alimentation</label>
                            <label><input type="checkbox" value="Essai"> Essai</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nombre total de points hors service :</label>
                        <input type="number" id="pts_hs" placeholder="Ex: 0">
                    </div>
                </div>

                <hr style="border-color: #333; margin: 20px 0;">

                <h3>Alarmes Diverses / Techniques</h3>
                <div class="form-group">
                    <div class="checkbox-group">
                        <label><input type="checkbox" value="Contrôleur passage d'eau local sprinkler"> Contrôleur passage d'eau local sprinkler</label>
                        <label><input type="checkbox" value="Défauts généraux sources B1/B2"> Défauts généraux sources B1/B2</label>
                        <label><input type="checkbox" value="Manque d'air"> Manque d'air</label>
                        <label><input type="checkbox" value="Niveaux de réserve"> Niveaux de réserve</label>
                        <label><input type="checkbox" value="Pompe jockey"> Pompe jockey</label>
                        <label><input type="checkbox" value="Pompe source B1"> Pompe source B1</label>
                        <label><input type="checkbox" value="Pompe source B2"> Pompe source B2</label>
                        <label><input type="checkbox" value="Températures locaux"> Températures locaux</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION 3 : SIEMENS -->
        <div class="section">
            <div class="section-header" onclick="toggleSection(this)">
                <span>REPORT SIEMENS (B1 & B2)</span>
                <span>▼</span>
            </div>
            <div class="section-content">
                <h3>Siemens B1</h3>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="siemens_b1" value="RAS" checked onchange="toggleDetails('siemens_b1_details', this.value)"> RAS</label>
                        <label><input type="radio" name="siemens_b1" value="NON RAS" onchange="toggleDetails('siemens_b1_details', this.value)"> NON RAS</label>
                    </div>
                </div>
                <div id="siemens_b1_details" class="hidden">
                    <div class="checkbox-group" style="margin-bottom: 10px;">
                        <label><input type="checkbox" value="Dérangement"> Dérangement</label>
                        <label><input type="checkbox" value="Reprise info locaux technique coupure armoire chaufferie"> Reprise info locaux technique coupure armoire chaufferie</label>
                    </div>
                    <input type="text" id="siemens_b1_libre" placeholder="Autre anomalie (texte libre)">
                </div>

                <hr style="border-color: #333; margin: 20px 0;">

                <h3>Siemens B2</h3>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="siemens_b2" value="RAS" checked onchange="toggleDetails('siemens_b2_details', this.value)"> RAS</label>
                        <label><input type="radio" name="siemens_b2" value="NON RAS" onchange="toggleDetails('siemens_b2_details', this.value)"> NON RAS</label>
                    </div>
                </div>
                <div id="siemens_b2_details" class="hidden">
                    <div class="checkbox-group" style="margin-bottom: 10px;">
                        <label><input type="checkbox" value="Dérangement"> Dérangement</label>
                        <label><input type="checkbox" value="Reprise info locaux technique coupure armoire chaufferie"> Reprise info locaux technique coupure armoire chaufferie</label>
                    </div>
                    <input type="text" id="siemens_b2_libre" placeholder="Autre anomalie (texte libre)">
                </div>
            </div>
        </div>

        <!-- SECTION 4 : LOCALISATION VANNES & INTRUSIONS -->
        <div class="section">
            <div class="section-header" onclick="toggleSection(this)">
                <span>VANNES & INTRUSIONS</span>
                <span>▼</span>
            </div>
            <div class="section-content">
                <h3>Intrusions Sous-Station</h3>
                <div class="form-group">
                    <div class="grid-checkbox" id="intrusion_list"></div>
                </div>
                
                <h3>Défauts Vannes / Feu Poste</h3>
                <div class="form-group">
                    <div class="grid-checkbox" id="vannes_list"></div>
                </div>
            </div>
        </div>

        <button class="btn-submit" onclick="genererRapport()">Générer le résumé de Ronde</button>
    </div>

    <script>
        // Gestion de l'horloge et titre dynamique (ex: 01:51 | Dedoum)
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeString = `${hours}:${minutes}`;
            
            document.getElementById('clock').textContent = timeString;
            document.title = `${timeString} | Dedoum`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Gestion du pliage/dépliage des sections accordéons
        function toggleSection(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector('span:last-child');
            content.classList.toggle('active');
            icon.textContent = content.classList.contains('active') ? '▲' : '▼';
        }

        // Afficher ou masquer les zones d'anomalies selon le bouton coché
        function toggleDetails(id, value) {
            const element = document.getElementById(id);
            if (value === 'NON RAS') {
                element.classList.remove('hidden');
            } else {
                element.classList.add('hidden');
            }
        }

        // Génération automatique des listes de bâtiments pour éviter un code trop lourd
        const intrusionList = document.getElementById('intrusion_list');
        const vannesList = document.getElementById('vannes_list');

        // Remplissage Intrusions : n1 bat1 à n9 bat1, et n1 bat2 à n4 bat2
        for(let i = 1; i <= 9; i++) {
            intrusionList.innerHTML += `<label><input type="checkbox" value="Intrusion n${i} bat1"> n${i} bat1</label>`;
        }
        for(let i = 1; i <= 4; i++) {
            intrusionList.innerHTML += `<label><input type="checkbox" value="Intrusion n${i} bat2"> n${i} bat2</label>`;
        }

        // Remplissage Vannes/Postes : n1 bat1 à n12 bat1, compresseur A air n13 bat1, n14 bat1 à n18 bat1, et n1 bat2 à n9 bat2
        for(let i = 1; i <= 12; i++) {
            vannesList.innerHTML += `<label><input type="checkbox" value="Poste n${i} bat1"> n${i} bat1</label>`;
        }
        vannesList.innerHTML += `<label><input type="checkbox" value="Poste A air n13 bat1"> A air n13</label>`;
        for(let i = 14; i <= 18; i++) {
            vannesList.innerHTML += `<label><input type="checkbox" value="Poste n${i} bat1"> n${i} bat1</label>`;
        }
        for(let i = 1; i <= 9; i++) {
            vannesList.innerHTML += `<label><input type="checkbox" value="Poste n${i} bat2"> n${i} bat2</label>`;
        }

        // Fonction pour générer le récapitulatif
        function genererRapport() {
            const time = document.getElementById('clock').textContent;
            alert(`Rapport initié à ${time}. Cette fonction peut maintenant être connectée à votre base Sheets ou servir à générer un bloc de texte propre à copier !`);
        }
    </script>
</body>
</html>
