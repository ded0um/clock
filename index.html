<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge & Liste</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background-color: black;
            color: white;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Conteneur principal qui sépare l'écran en deux */
        #main-container {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
        }

        /* Partie Horloge (2/3) */
        #clock-zone {
            flex: 0 0 66.66%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Partie Liste (1/3) */
        #todo-list {
            flex: 0 0 33.33%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            height: 100%;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        #date { font-size: 2vw; opacity: 0.6; margin-bottom: 1vh; text-transform: capitalize; }
        #clock { font-size: 12vw; font-weight: 700; }

        .todo-item {
            font-size: 1.5vw;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s ease;
        }
        .todo-item.fade-out { opacity: 0; transform: translateX(20px); height: 0; overflow: hidden; }
        .todo-checkbox { width: 1.5vw; height: 1.5vw; cursor: pointer; }

        /* Contrôles */
        #controls-container { position: absolute; bottom: 25px; right: 25px; z-index: 10; display: flex; align-items: center; gap: 20px; opacity: 0.5; }
        .control-btn { font-size: 24px; cursor: pointer; width: 35px; height: 35px; text-align: center; }
        #color-picker { opacity: 0; position: absolute; width: 35px; height: 35px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="clock-zone" onclick="toggleFullscreen()">
            <div id="date">Chargement...</div>
            <div id="clock">00:00</div>
        </div>

        <div id="todo-list">
            <h2 style="font-size: 1.8vw;">À faire :</h2>
            <div id="todo-items-container"></div>
        </div>
    </div>

    <div id="controls-container">
        <span id="gear-btn" class="control-btn">&#9881;<input type="color" id="color-picker" value="#000000"></span>
    </div>

    <script>
        let lastCheckedDayStr = "";
        let hiddenTasks = new Set();

        function updateClockAndTasks() {
            const now = new Date();
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('clock').innerHTML = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

            const totalMinutes = now.getHours() * 60 + now.getMinutes();
            const isShiftActive = (totalMinutes >= 19 * 60) || (totalMinutes < 6 * 60 + 30);
            const todoListDiv = document.getElementById('todo-list');

            if (!isShiftActive) {
                todoListDiv.style.display = 'none';
                return;
            }

            let referenceDate = new Date(now);
            if (now.getHours() < 12) referenceDate.setDate(referenceDate.getDate() - 1);
            
            const currentDayStr = referenceDate.toDateString();
            if (currentDayStr !== lastCheckedDayStr) {
                hiddenTasks.clear();
                lastCheckedDayStr = currentDayStr;
            }

            // Logique de tâches
            let tasks = [];
            if (referenceDate.getDay() === 2) tasks.push("B1 : Contrôle des vannes de postes");
            if (referenceDate.getDay() === 1 && referenceDate.getDate() <= 7) { tasks.push("B1 : Contrôle des IS"); tasks.push("B1 : Contrôle des DM"); }
            if (referenceDate.getDay() === 2 && referenceDate.getDate() <= 7) { tasks.push("B1 : Contrôle des compteurs paratonnerre"); tasks.push("B1 : Contrôle des douches et rince-œil"); tasks.push("B2 : Contrôle des compteurs paratonnerre"); }
            if (referenceDate.getDay() === 3 && referenceDate.getDate() <= 7) tasks.push("B1 : Contrôle des cales et chandelles");
            if (referenceDate.getDay() === 4 && referenceDate.getDate() <= 7) tasks.push("B1 : Contrôle des éclairages entrepôt");
            if (referenceDate.getDay() === 5 && referenceDate.getDate() <= 7) tasks.push("B1 : Contrôle des BAES");

            const visibleTasks = tasks.filter(task => !hiddenTasks.has(task));

            if (visibleTasks.length > 0) {
                todoListDiv.style.display = 'block';
                const container = document.getElementById('todo-items-container');
                if (container.children.length !== visibleTasks.length) {
                    container.innerHTML = visibleTasks.map(task => `
                        <div class="todo-item" data-task="${task}">
                            <input type="checkbox" class="todo-checkbox" onchange="checkTask(this)">
                            <span>${task}</span>
                        </div>
                    `).join('');
                }
            } else {
                todoListDiv.style.display = 'none';
            }
        }

        function checkTask(checkbox) {
            const item = checkbox.closest('.todo-item');
            hiddenTasks.add(item.getAttribute('data-task'));
            item.classList.add('fade-out');
            setTimeout(updateClockAndTasks, 400);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // Couleur
        document.getElementById('color-picker').addEventListener('input', (e) => {
            const col = e.target.value;
            document.body.style.backgroundColor = col;
            const brightness = (parseInt(col.substr(1,2),16)*299 + parseInt(col.substr(3,2),16)*587 + parseInt(col.substr(5,2),16)*114)/1000;
            document.body.style.color = brightness > 128 ? '#000000' : '#ffffff';
        });

        setInterval(updateClockAndTasks, 1000);
        updateClockAndTasks();
    </script>
</body>
</html>
